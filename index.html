<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trig Sudoku</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1424;
    --panel: #1a2540;
    --accent: #64c8ff;
    --gold: #ffd250;
    --red: #f87171;
    --text: #dce8ff;
    --dim: #6b7fa8;
    --cell-locked: #e8eeff;
    --cell-empty: #c8d8f8;
    --cell-select: #64c8ff;
    --cell-correct: #6ee7b7;
    --cell-wrong: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
  }

  #app {
    width: 100%; height: 100vh; height: 100dvh;
    max-width: 1200px;
    margin: 0 auto;
    overflow: hidden;
    background: var(--bg);
    position: relative;
  }

  /* ── screens ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    transition: opacity .25s, transform .25s;
  }
  .screen.hidden { opacity:0; pointer-events:none; transform:scale(.97); }

  .bg-circles { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .bg-circles span {
    position:absolute; border-radius:50%;
    border:1.5px solid rgba(100,200,255,.08);
    top:50%; left:50%; transform:translate(-50%,-60%);
  }

  /* ── First page ── */
  .title-wrap { text-align:center; margin-bottom:36px; }
  .title-trig, .title-sudoku {
    font-family:'Space Mono',monospace; font-weight:700;
    letter-spacing:4px; line-height:1;
    font-size: clamp(28px, min(9vw,8vh), 56px);
  }
  .title-trig   { color:var(--accent); text-shadow:0 0 40px rgba(100,200,255,.4); }
  .title-sudoku { color:var(--text); }
  .subtitle { color:var(--dim); font-size:clamp(11px,1.8vw,14px); margin-top:10px; letter-spacing:2px; }

  .btn {
    border:none; cursor:pointer;
    font-family:'Space Mono',monospace; font-weight:700;
    border-radius:14px; padding:14px 36px;
    transition:all .2s; letter-spacing:1px;
    font-size:clamp(13px,2.5vw,16px);
  }
  .btn-primary {
    background:linear-gradient(135deg,#1e3a6e,#2a5298);
    color:var(--accent); border:2px solid var(--accent);
    box-shadow:0 0 20px rgba(100,200,255,.15);
  }
  .btn-primary:hover { background:linear-gradient(135deg,#2a5298,#3b6fd4); transform:translateY(-2px); }
  .btn-back {
    background:transparent; color:var(--dim);
    border:1px solid var(--dim);
    font-size:11px; padding:7px 14px; border-radius:8px;
  }
  .btn-back:hover { color:var(--text); border-color:var(--text); }

  .diff-btns { display:flex; flex-direction:column; gap:10px; width:100%; max-width:260px; }
  .btn-diff {
    border:none; cursor:pointer; border-radius:12px;
    padding:clamp(10px,1.5vh,14px) 20px;
    display:flex; flex-direction:column; align-items:center; transition:all .2s;
  }
  .btn-diff .d-name { font-family:'Space Mono',monospace; font-weight:700; letter-spacing:1px; font-size:clamp(14px,3vw,18px); }
  .btn-diff .d-desc { font-size:11px; margin-top:2px; opacity:.7; }
  .btn-easy   { background:#0d2b1a; border:2px solid #6ee7b7; }
  .btn-easy   .d-name { color:#6ee7b7; }
  .btn-medium { background:#2b2200; border:2px solid #ffd250; }
  .btn-medium .d-name { color:#ffd250; }
  .btn-hard   { background:#2b0d0d; border:2px solid #f87171; }
  .btn-hard   .d-name { color:#f87171; }
  .btn-diff:hover { transform:translateY(-2px) scale(1.02); filter:brightness(1.2); }

  /* ════════════════════════════════════════
     GAME SCREEN NEW LAYOUT
  ════════════════════════════════════════ */
  #game-screen {
    padding: 10px;
    justify-content: flex-start;
    overflow: hidden;
    height: 100%;
  }

  .top-bar {
    width:100%; display:flex; align-items:center; justify-content:space-between;
    height: 38px;
    margin-bottom: 5px;
    flex-shrink: 0;
  }
  .timer { font-family:'Space Mono',monospace; font-size:clamp(15px,3.5vw,20px); color:var(--accent); letter-spacing:2px; }
  .diff-badge { font-size:11px; color:var(--dim); letter-spacing:1px; }

  .hearts {
    display:flex; gap:5px; justify-content:center;
    margin-bottom: 8px;
    flex-shrink:0;
  }
  .heart { font-size:clamp(13px,2.5vw,18px); transition:transform .2s; }
  .heart.empty { filter:grayscale(1) opacity(.3); }
  .heart.shake { animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  /* โครงสร้างห่อหุ้มหลัก */
  #game-body {
    flex: 1;
    min-height: 0;
    width: 100%;
    display: flex;
    overflow: hidden;
    
    /* โหมดเริ่มต้น: มือถือ (ตารางอยู่บน ปุ่มคำตอบอยู่ล่าง) */
    flex-direction: column;
    gap: 12px;
  }

  #grid-side {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    flex-shrink: 0;
  }

  #grid-wrap {
    width: 100%;
    max-width: 340px; /* จำกัดขนาดตารางบนมือถือไม่ให้ล้นจอ */
    aspect-ratio: 1;
  }

  #grid {
    display: grid;
    border: 2px solid var(--accent);
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
    height: 100%;
    box-shadow: 0 0 20px rgba(100,200,255,.15);
  }

  .cell {
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-family:'Space Mono',monospace; color:#1a2540; font-weight:7
